<head>
  {{ if "I don't know how to ensure newlines" }}<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{ end }}
  {{- partial "opengraph.html" . -}}
  <style>
    body {
      display: flex;
      justify-content: center;
      margin: 2rem;
      flex-direction: column;
      max-width: 50rem;
      line-height: 1.5;
    }

    nav ul {
      display: flex;
      max-width: 50rem;
      justify-content: space-around;
      padding: 0;
    }

    nav li {
      display: inline;
    }

    .heading-anchor{
      text-decoration: none;
      color: inherit;
    }

    .heading-anchor::after {
      content: " ⚓️";
      opacity: 0;
      transition: opacity 0.15s ease-in-out;
    }

    .heading-anchor:hover::after {
      opacity: 1;
    }
  </style>
  {{ $title := print .Site.Title " | " .Title }}
  {{ if .IsHome }}{{ $title = .Site.Title }}{{ end }}
  <title>{{ $title }}</title>
</head>
